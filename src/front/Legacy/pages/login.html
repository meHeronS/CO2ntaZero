<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CO2ntaZero - Acesso</title>
</head>
<body>
    <main class="login-container">
        <h1>Entrar no CO2ntaZero</h1>
        <form id="login-form">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="Digite seu e-mail">
            </div>
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required placeholder="Digite sua senha">
            </div>
            <button type="submit">Entrar</button>
        </form>
    </main>
    <script type="module" src="../js/pages/login.js"></script>
</body>
</html>
