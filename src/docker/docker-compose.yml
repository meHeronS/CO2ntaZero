version: '3.8'

services:
  backend:
    build:
      context: ../back
      dockerfile: ../docker/backend.Dockerfile
    container_name: co2ntazero-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/co2ntazero
      - JWT_SECRET=change_this_secret_in_production
      - NODE_ENV=development
    depends_on:
      - mongo
    networks:
      - co2ntazero-network
    volumes:
      - ../back:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    image: nginx:alpine
    container_name: co2ntazero-frontend
    ports:
      - "3000:80"
    volumes:
      - ../front/Legacy:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - co2ntazero-network

  # react-demo:
  #   build:
  #     context: ../codes/react
  #     dockerfile: ../../docker/frontend.Dockerfile
  #   container_name: co2ntazero-react-demo
  #   ports:
  #     - "3001:3000"
  #   environment:
  #     - REACT_APP_API_URL=http://localhost:5000/api
  #   depends_on:
  #     - backend
  #   networks:
  #     - co2ntazero-network

  mongo:
    image: mongo:latest
    container_name: co2ntazero-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - co2ntazero-network

volumes:
  mongo-data:

networks:
  co2ntazero-network:
    driver: bridge
